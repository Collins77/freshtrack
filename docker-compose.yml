db:
    image: postgres:15-alpine
    container_name: freshtrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: freshtrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: freshtrack2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./freshtrack-backend/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./freshtrack-backend/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5